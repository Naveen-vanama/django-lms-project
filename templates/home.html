<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CollegePortal</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
    overflow-x: hidden;
}

/* Navbar */
.navbar {
    background: transparent;
    padding: 20px 0;
}

.navbar-brand {
    font-weight: 700;
    font-size: 22px;
}

/* Hero */
.hero {
    min-height: 95vh;
    display: flex;
    align-items: center;
}

.highlight {
    background: linear-gradient(90deg, #3b82f6, #06b6d4);
    background-clip: text;
    -webkit-background-clip: text;
    color: transparent;
}

.hero h1 {
    font-weight: 800;
    font-size: 56px;
    line-height: 1.2;
}

/* Buttons */
.btn-primary-custom {
    background: linear-gradient(135deg,#3b82f6,#2563eb);
    border: none;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 600;
    box-shadow: 0 10px 30px rgba(59,130,246,0.4);
}

.btn-outline-custom {
    border: 2px solid #3b82f6;
    color: #3b82f6;
    padding: 14px 28px;
    border-radius: 14px;
    font-weight: 600;
}

.btn-outline-custom:hover {
    background: #3b82f6;
    color: white;
}

/* Floating image */
.hero-img {
    max-width: 420px;
    animation: float 4s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* Glow background circle */
.glow {
    position: absolute;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle,#3b82f6 0%, transparent 70%);
    filter: blur(120px);
    z-index: -1;
    top: 20%;
    right: 10%;
}

/* Fade animation */
.fade-in {
    opacity: 0;
    transform: translateY(40px);
    animation: fadeUp 1s ease forwards;
}

.fade-delay {
    animation-delay: .5s;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>
</head>

<body>

<nav class="navbar container">
    <span class="navbar-brand">CollegePortal</span>
    <a href="/users/login/" class="btn btn-primary-custom">Login</a>
</nav>

<section class="hero container position-relative">

<div class="glow"></div>

<div class="row align-items-center w-100">

    <!-- LEFT -->
    <div class="col-lg-6 fade-in">

        <span class="badge bg-primary-subtle text-primary px-3 py-2 rounded-pill">
            🚀 Career Acceleration Program
        </span>

        <h1 class="mt-4">
            Land a
            <span class="highlight">₹5–16 LPA Job</span>
            in 120 Days
        </h1>

        <p class="mt-4 text-light">
            Master Python, Django & Full Stack Development.
            Get job-ready with industry projects and placement support.
        </p>

        <div class="mt-4 d-flex gap-3">
            <a href="/courses/" class="btn btn-primary-custom">
                Explore Courses
            </a>
            <a href="/users/register/" class="btn btn-outline-custom">
                Join Now
            </a>
        </div>

        <p class="mt-4 text-muted">
            ⭐ 4.9/5 from 7,500+ students
        </p>

    </div>

    <!-- RIGHT -->
    <div class="col-lg-6 text-center fade-in fade-delay">
        <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png"
             class="hero-img img-fluid"
             alt="Student">
    </div>

</div>

</section>

</body>
</html>
