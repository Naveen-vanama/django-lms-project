{% extends 'base.html' %}
{% block title %}Create Group – CollegePortal{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'courses:detail' batch.course.pk %}" class="text-muted me-3"><i class="bi bi-arrow-left fs-5"></i></a>
  <h4 class="fw-bold mb-0">Create Group – {{ batch }}</h4>
</div>
<div class="page-card" style="max-width:480px;">
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold">Group Name</label>
      {{ form.name }}
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold">Members (enrolled students)</label>
      {{ form.members }}
      <div class="form-text">Hold Ctrl/Cmd to select multiple students.</div>
    </div>
    <div class="d-flex gap-2 mt-3">
      <button type="submit" class="btn" style="background:#4f46e5;color:#fff;">
        <i class="bi bi-save me-1"></i> Save Group
      </button>
      <a href="{% url 'courses:detail' batch.course.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
