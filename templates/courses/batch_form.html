{% extends 'base.html' %}
{% block title %}{{ title }} – CollegePortal{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
  <a href="{% url 'courses:detail' course.pk %}" class="text-muted me-3"><i class="bi bi-arrow-left fs-5"></i></a>
  <h4 class="fw-bold mb-0">{{ title }} – {{ course.title }}</h4>
</div>
<div class="page-card" style="max-width:560px;">
  <form method="post" novalidate>
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-12">
        <label class="form-label fw-semibold">Batch Name</label>
        {{ form.name }}
      </div>
      <div class="col-6">
        <label class="form-label fw-semibold">Start Date</label>
        {{ form.start_date }}
      </div>
      <div class="col-6">
        <label class="form-label fw-semibold">End Date</label>
        {{ form.end_date }}
      </div>
      <div class="col-6">
        <label class="form-label fw-semibold">Max Students</label>
        {{ form.max_students }}
      </div>
    </div>
    <div class="d-flex gap-2 mt-4">
      <button type="submit" class="btn" style="background:#4f46e5;color:#fff;">
        <i class="bi bi-save me-1"></i> Create Batch
      </button>
      <a href="{% url 'courses:detail' course.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
